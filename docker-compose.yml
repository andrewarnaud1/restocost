# ============================================================================
# RestoCost - Docker Compose Configuration
# Complete setup for development and production
# ============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: restocost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-restocost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restocost}
      POSTGRES_DB: ${POSTGRES_DB:-restocost}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restocost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restocost-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restocost-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-restocost}:${POSTGRES_PASSWORD:-restocost}@postgres:5432/${POSTGRES_DB:-restocost}

      # Security
      SECRET_KEY: ${SECRET_KEY:-changeme-generate-a-secure-random-key-here}
      ALGORITHM: ${ALGORITHM:-HS256}

      # API Configuration
      API_V1_PREFIX: ${API_V1_PREFIX:-/api}
      PROJECT_NAME: ${PROJECT_NAME:-RestoCost}
      VERSION: ${VERSION:-0.1.0}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount code for development (comment out for production)
      - ./backend:/app:cached
      # Preserve virtual environment
      - backend_venv:/app/.venv
    command: >
      sh -c "
        pip install -e . &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - restocost-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend (Future - when implemented)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: restocost-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "${FRONTEND_PORT:-3000}:3000"
  #   environment:
  #     - VITE_API_URL=http://localhost:8000
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend:/app:cached
  #     - frontend_node_modules:/app/node_modules
  #   command: npm run dev
  #   networks:
  #     - restocost-network

volumes:
  postgres_data:
    name: restocost_postgres_data
  backend_venv:
    name: restocost_backend_venv
  # frontend_node_modules:
  #   name: restocost_frontend_node_modules

networks:
  restocost-network:
    name: restocost_network
    driver: bridge
